name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools_scm can derive the version on build.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Tests
        run: uv run pytest -q

      # Regenerate the CLI surface JSON and fail if the committed file is
      # stale. kleo's docs site consumes surface/cli.json at release tags;
      # drift here would silently ship reference docs that don't match the
      # CLI's actual command tree.
      - name: CLI surface drift check
        run: uv run python scripts/gen_cli_surface.py --check

      - name: Build sdist + wheel
        run: uv build

      - name: Upload distributions as artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
