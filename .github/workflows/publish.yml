name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing (OIDC)

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi-publish  # requires manual approval per environment policy
    env:
      # Frozen so no build step (uv sync / uv run / uv build) re-resolves and rewrites
      # uv.lock. With dynamic = ["version"] (setuptools_scm), a non-frozen `uv run`
      # recomputes the editable package's version into the lock, dirtying the tree —
      # which makes setuptools_scm emit a dev version (e.g. 0.1.0b13.dev0) instead of the
      # tag, failing the "Verify built version matches tag" check below.
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Full history + tags so setuptools_scm can derive the version from the tag.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check && uv run ruff format --check

      - name: Tests
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      # The version is derived from the tag by setuptools_scm, so build output and
      # tag can't drift — but assert it anyway to fail fast if tags weren't fetched
      # (a shallow checkout would otherwise yield a 0.0.0 dev version).
      - name: Verify built version matches tag
        run: |
          REF_TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${REF_TAG#v}"
          if ! ls "dist/plgt-${EXPECTED}.tar.gz" >/dev/null 2>&1; then
            echo "Built dist does not match tag ${REF_TAG} (expected version ${EXPECTED}):"
            ls -1 dist/
            exit 1
          fi

      - name: Publish to PyPI (trusted publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
