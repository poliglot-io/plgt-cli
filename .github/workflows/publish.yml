name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing (OIDC)

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi-publish  # requires manual approval per environment policy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check && uv run ruff format --check

      - name: Tests
        run: uv run pytest -q

      - name: Verify tag matches pyproject version
        run: |
          PKG_VERSION="v$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          REF_TAG="${GITHUB_REF#refs/tags/}"
          if [ -n "${{ inputs.tag }}" ]; then REF_TAG="${{ inputs.tag }}"; fi
          if [ "$PKG_VERSION" != "$REF_TAG" ]; then
            echo "Tag $REF_TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
